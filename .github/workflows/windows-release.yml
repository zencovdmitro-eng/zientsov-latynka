name: Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Prepare deterministic payload
        shell: powershell
        run: .\prepare_release.ps1
      - name: Install NSIS
        shell: powershell
        run: choco install nsis --no-progress -y
      - name: Build installer
        shell: powershell
        run: '& "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /INPUTCHARSET UTF8 installer\windows.nsi'
      - uses: actions/upload-artifact@v4
        with:
          name: ZIENTSOV_LATYNKA_Setup_v0.4.9
          path: ZIENTSOV_LATYNKA_Setup_v0.4.9.exe
          if-no-files-found: error
